name: Weekly Digest

on:
  schedule:
    - cron: "0 8 * * 0"   # Sundays at 8 AM UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: weekly-digest
  cancel-in-progress: true

jobs:
  run-weekly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install dependencies (locked)
        run: uv sync --frozen

      - name: Generate weekly digest
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: |
          uv run python -c "from src.paper_digest.render.weekly import generate_weekly; generate_weekly()"

      - name: Commit weekly outputs
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"

          git add outputs/ docs/ || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Weekly digest $(date -u +%Y-%m-%d) [skip ci]"
          git push
