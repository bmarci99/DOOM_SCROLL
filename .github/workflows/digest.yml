name: Daily Digest

on:
  schedule:
    # Runs at 07:00 UTC every day (08:00 Berlin in winter, 09:00 in summer)
    - cron: "0 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          # Email creds (set in GitHub repo Settings → Secrets and variables → Actions)
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
        run: |
          python main.py

      # Optional: commit outputs back to the repo so you can browse history in GitHub
      - name: Commit outputs
        run: |
          git config user.name "digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add outputs/digest.md outputs/digest.json || true
          git commit -m "Update digest" || exit 0
          git push